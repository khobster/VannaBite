<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANNA BITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Staatliches&display=swap');
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Staatliches', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            padding: 20px;
            color: white;
        }
        
        h1 {
            font-family: 'Staatliches', cursive;
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            font-size: 4rem;
            letter-spacing: 2px;
            text-shadow: 
                4px 4px 0px #8b6914,
                -1px -1px 0px #fff8dc;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; max-width: 1200px; width: 100%; }
        .game-area { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        
        .vanna-container { 
            width: 420px; 
            height: 580px; 
            position: relative; 
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Vanna - COMPLETELY STATIC */
        #vanna-img {
            width: auto;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }
        
        @keyframes shake { 
            0% { transform: translateX(0); } 
            25% { transform: translateX(-3px) rotate(-1deg); }
            75% { transform: translateX(3px) rotate(1deg); }
            100% { transform: translateX(0); }
        }

        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }
        
        .vanna-container.shake #vanna-img { animation: shake 0.1s linear infinite; }
        .vanna-container.bounce #vanna-img { animation: bounce 0.4s ease-in-out infinite; }
        
        .wheel-container { 
            position: relative; 
            width: 500px; 
            height: 500px; 
            margin: 20px 0; 
        }
        
        .wheel-outer-rim {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(160deg, #d4a84b 0%, #c9952c 30%, #a67c00 50%, #c9952c 70%, #d4a84b 100%);
            box-shadow: 
                inset 0 0 0 4px #8b6914,
                inset 0 0 0 8px #d4a84b,
                0 8px 25px rgba(0,0,0,0.6);
        }
        
        .wheel {
            position: absolute;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            top: 12px;
            left: 12px;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 8s cubic-bezier(0.15, 0.85, 0.1, 1);
        }
        
        .wheel svg {
            width: 100%;
            height: 100%;
        }
        
        .center-hub {
            position: absolute; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; 
            height: 140px;
            background: radial-gradient(circle at 40% 35%, #5dbe5d 0%, #3aa63a 40%, #2d8a2d 70%, #1f6b1f 100%);
            border-radius: 50%; 
            z-index: 10;
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff; 
            font-size: 26px;
            font-family: 'Staatliches', cursive;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.7);
            border: 4px solid #2d7a2d;
            box-shadow: 
                inset 0 3px 10px rgba(255,255,255,0.3),
                inset 0 -5px 15px rgba(0,0,0,0.3),
                0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        
        .center-hub:hover { 
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        .pointer {
            position: absolute; 
            top: -5px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 15;
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 60px solid #cc0000;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.5));
        }
        
        .pointer::after {
            content: '';
            position: absolute;
            top: -60px;
            left: -16px;
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 50px solid #ff3333;
        }
        
        /* === RETRO 70s/80s GAME SHOW CONTROLS === */
        .controls { 
            margin-top: 30px; 
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            max-width: 520px;
        }
        
        .input-group { 
            display: flex; 
            margin-bottom: 10px; 
            width: 100%; 
        }
        
        input {
            flex-grow: 1; 
            padding: 16px 20px;
            border: none;
            margin-right: 0; 
            font-size: 20px;
            font-family: 'Staatliches', cursive;
            background: linear-gradient(180deg, #fff8dc 0%, #f0e68c 100%);
            color: #222;
            letter-spacing: 1px;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.8),
                inset 0 -3px 0 rgba(0,0,0,0.15),
                4px 4px 0 #8b6914;
        }
        
        input::placeholder {
            color: #888;
        }
        
        input:focus {
            outline: none;
            background: linear-gradient(180deg, #fffacd 0%, #fff8dc 100%);
        }
        
        button {
            padding: 16px 32px; 
            background: linear-gradient(180deg, #ff6b35 0%, #d63000 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 22px; 
            font-family: 'Staatliches', cursive;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                inset 0 -3px 0 rgba(0,0,0,0.2),
                4px 4px 0 #8b2500;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        button:hover { 
            background: linear-gradient(180deg, #ff7f50 0%, #e63900 100%);
            transform: translate(-1px, -1px);
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                inset 0 -3px 0 rgba(0,0,0,0.2),
                5px 5px 0 #8b2500;
        }
        
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.3),
                inset 0 -3px 0 rgba(0,0,0,0.2),
                2px 2px 0 #8b2500;
        }
        
        .char-limit {
            text-align: right;
            padding: 6px 4px;
            color: #d4a84b;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .option-list {
            margin-top: 15px; 
            width: 100%;
            background: linear-gradient(180deg, #4169e1 0%, #2a4db5 100%);
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.2),
                inset 0 -4px 0 rgba(0,0,0,0.2),
                6px 6px 0 #1a2d6b;
        }
        
        .option-list h3 {
            text-align: center; 
            padding: 16px; 
            margin: 0;
            background: linear-gradient(180deg, #ffd700 0%, #daa520 100%);
            font-family: 'Staatliches', cursive;
            color: #1a1a00; 
            font-size: 1.6rem;
            letter-spacing: 3px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.4),
                inset 0 -3px 0 rgba(0,0,0,0.15);
        }
        
        .options-scroll {
            max-height: 220px; 
            overflow-y: auto;
        }
        
        .option-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 18px; 
            border-bottom: 3px solid rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.05);
        }
        
        .option-item:nth-child(even) {
            background: rgba(0,0,0,0.1);
        }
        
        .option-item span { 
            display: flex; 
            align-items: center; 
            gap: 14px;
            font-family: 'Staatliches', cursive;
            font-size: 20px;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        
        .color-dot { 
            width: 28px; 
            height: 28px; 
            border: 3px solid #fff;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
        
        .delete-btn { 
            background: linear-gradient(180deg, #ff4444 0%, #cc0000 100%);
            color: white; 
            padding: 8px 16px;
            font-size: 16px;
            font-family: 'Staatliches', cursive;
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.3),
                2px 2px 0 #660000;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }
        
        .delete-btn:hover {
            background: linear-gradient(180deg, #ff5555 0%, #dd1111 100%);
        }
        
        .result {
            margin-top: 30px; 
            padding: 24px 60px;
            background: linear-gradient(180deg, #ffd700 0%, #daa520 100%);
            color: #1a1a00; 
            text-align: center; 
            font-size: 36px; 
            display: none;
            font-family: 'Staatliches', cursive;
            letter-spacing: 3px;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            box-shadow: 
                inset 0 3px 0 rgba(255,255,255,0.4),
                inset 0 -4px 0 rgba(0,0,0,0.15),
                8px 8px 0 #8b6914;
        }
        
        #option-count {
            text-align: center;
            padding: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            letter-spacing: 3px;
            font-family: 'Staatliches', cursive;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }
        
        @media (max-width: 950px) {
            .game-area { flex-direction: column; }
            .vanna-container { width: 300px; height: 420px; }
            .wheel-container { width: 380px; height: 380px; }
            .center-hub { width: 110px; height: 110px; font-size: 20px; }
            h1 { font-size: 2.8rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VANNA BITE</h1>
        
        <div class="game-area">
            <div class="vanna-container" id="vanna-container">
                <img id="vanna-img" src="vanna_bite_idle.png" alt="Vanna">
            </div>
            
            <div class="wheel-container">
                <div class="wheel-outer-rim"></div>
                <div class="wheel" id="wheel"></div>
                <div class="center-hub" id="spinner">SPIN!</div>
                <div class="pointer"></div>
            </div>
        </div>
        
        <div class="result" id="result"></div>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="new-option" placeholder="ENTER DINNER OPTION..." maxlength="8">
                <button id="add-btn">ADD</button>
            </div>
            <div class="char-limit">MAX 8 LETTERS</div>
            <div class="option-list">
                <h3>★ TONIGHT'S OPTIONS ★</h3>
                <div id="option-count"></div>
                <div class="options-scroll">
                    <div id="options-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const MAX_CHARS = 8;
        let dinnerOptions = ["PIZZA", "TACOS", "PASTA", "BURGERS", "CHINESE", "SUSHI", "BBQ", "SALAD"];
        let wheelColors = [];
        let blackSliceIndex = 0;

        function generateWheelColors(count) {
            if (count === 0) return [];
            
            const colors = [];
            const colorCount = count - 1;
            const step = 360 / Math.max(colorCount, 1);
            
            blackSliceIndex = Math.floor(count / 2);
            
            let hueIndex = 0;
            for (let i = 0; i < count; i++) {
                if (i === blackSliceIndex) {
                    colors.push({ bg: '#111111' });
                } else {
                    const hue = Math.floor(hueIndex * step);
                    colors.push({ bg: `hsl(${hue}, 80%, 50%)` });
                    hueIndex++;
                }
            }
            return colors;
        }
        
        const wheel = document.getElementById('wheel');
        const vannaContainer = document.getElementById('vanna-container');
        const vannaImg = document.getElementById('vanna-img');
        const resultDiv = document.getElementById('result');
        
        function setVannaState(state) {
            vannaContainer.className = 'vanna-container';
            
            switch(state) {
                case 'watching':
                    vannaContainer.classList.add('shake');
                    vannaImg.src = 'vanna_bite_watching.png';
                    break;
                case 'win':
                    vannaContainer.classList.add('bounce');
                    vannaImg.src = 'vanna_bite_winning.png';
                    break;
                default:
                    vannaImg.src = 'vanna_bite_idle.png';
            }
        }
        
        function createWheel() {
            const n = dinnerOptions.length;
            if (n === 0) { 
                wheel.innerHTML = '<div style="width:100%;height:100%;background:#333;border-radius:50%;"></div>';
                wheelColors = [];
                return; 
            }
            
            wheelColors = generateWheelColors(n);
            const sliceAngle = 360 / n;
            const sliceAngleRad = (sliceAngle * Math.PI) / 180;
            const size = 476;
            const cx = size / 2;
            const cy = size / 2;
            const radius = size / 2;
            const innerRadius = 75;
            
            let svgContent = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            
            // Draw segments
            for (let i = 0; i < n; i++) {
                const startAngle = (i * sliceAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * sliceAngle - 90) * Math.PI / 180;
                
                const x1 = cx + radius * Math.cos(startAngle);
                const y1 = cy + radius * Math.sin(startAngle);
                const x2 = cx + radius * Math.cos(endAngle);
                const y2 = cy + radius * Math.sin(endAngle);
                
                const largeArc = sliceAngle > 180 ? 1 : 0;
                
                const pathD = `M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                svgContent += `<path d="${pathD}" fill="${wheelColors[i].bg}" stroke="#222" stroke-width="1"/>`;
            }
            
            // Gold dividers
            for (let i = 0; i < n; i++) {
                const angle = (i * sliceAngle - 90) * Math.PI / 180;
                const x1 = cx + innerRadius * Math.cos(angle);
                const y1 = cy + innerRadius * Math.sin(angle);
                const x2 = cx + radius * Math.cos(angle);
                const y2 = cy + radius * Math.sin(angle);
                svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#a67c00" stroke-width="3"/>`;
            }
            
            // Text - stretched letters
            for (let i = 0; i < n; i++) {
                const midAngleDeg = (i + 0.5) * sliceAngle;
                const midAngle = (midAngleDeg - 90) * Math.PI / 180;
                const text = dinnerOptions[i].toUpperCase().substring(0, MAX_CHARS);
                const textLength = text.length;
                
                if (textLength === 0) continue;
                
                const outerTextRadius = radius - 12;
                const innerTextRadius = innerRadius + 8;
                const availableRadial = outerTextRadius - innerTextRadius;
                const baseFontSize = availableRadial / textLength * 0.95;
                
                for (let j = 0; j < textLength; j++) {
                    const letterRadius = outerTextRadius - (j * baseFontSize) - (baseFontSize / 2);
                    if (letterRadius < innerTextRadius) break;
                    
                    const sliceWidth = 2 * letterRadius * Math.sin(sliceAngleRad / 2);
                    const naturalWidth = baseFontSize * 0.55;
                    const targetWidth = sliceWidth * 0.85;
                    const scaleX = targetWidth / naturalWidth;
                    
                    const lx = cx + letterRadius * Math.cos(midAngle);
                    const ly = cy + letterRadius * Math.sin(midAngle);
                    const transform = `rotate(${midAngleDeg}, ${lx}, ${ly}) scale(${scaleX}, 1)`;
                    const adjustedX = lx / scaleX;
                    
                    // Shadow
                    svgContent += `<text x="${adjustedX + 2/scaleX}" y="${ly + 2}" 
                        font-family="Staatliches, Impact, sans-serif" font-size="${baseFontSize}"
                        text-anchor="middle" dominant-baseline="middle" fill="#000000"
                        transform="${transform}">${text[j]}</text>`;
                    
                    // Letter
                    svgContent += `<text x="${adjustedX}" y="${ly}" 
                        font-family="Staatliches, Impact, sans-serif" font-size="${baseFontSize}"
                        text-anchor="middle" dominant-baseline="middle" fill="#ffffff"
                        stroke="#000000" stroke-width="1.5" paint-order="stroke fill"
                        transform="${transform}">${text[j]}</text>`;
                }
            }
            
            svgContent += '</svg>';
            wheel.innerHTML = svgContent;
        }
        
        function updateList() {
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            document.getElementById('option-count').innerText = `${dinnerOptions.length} DELICIOUS CHOICES`;
            
            dinnerOptions.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                const color = wheelColors[i] ? wheelColors[i].bg : '#888';
                div.innerHTML = `
                    <span><div class="color-dot" style="background:${color}"></div>${opt.toUpperCase()}</span>
                    <button class="delete-btn" onclick="removeItem(${i})">✕</button>
                `;
                list.appendChild(div);
            });
        }
        
        function removeItem(i) {
            dinnerOptions.splice(i, 1);
            save(); refresh();
        }
        
        function refresh() {
            createWheel();
            updateList();
        }
        
        function save() {
            localStorage.setItem('vannaBiteOptions', JSON.stringify(dinnerOptions));
        }

        let isSpinning = false;
        let currentRotation = 0;

        function spin() {
            if (isSpinning || dinnerOptions.length === 0) return;
            isSpinning = true;
            resultDiv.style.display = 'none';
            
            setVannaState('watching');
            
            const n = dinnerOptions.length;
            const sliceAngle = 360 / n;
            const winnerIndex = Math.floor(Math.random() * n);
            
            const targetRotation = 360 - (winnerIndex * sliceAngle + sliceAngle / 2);
            // More spins for longer duration!
            const extraSpins = 360 * (8 + Math.floor(Math.random() * 6));
            const totalRotation = currentRotation + extraSpins + (targetRotation - (currentRotation % 360));
            
            const finalRotation = totalRotation > currentRotation ? totalRotation : totalRotation + 360;
            currentRotation = finalRotation;
            
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            
            // Longer timeout to match 8 second spin
            setTimeout(() => {
                setVannaState('win');
                resultDiv.innerText = `TONIGHT: ${dinnerOptions[winnerIndex].toUpperCase()}!`;
                resultDiv.style.display = 'block';
                
                setTimeout(() => {
                    setVannaState('idle');
                    isSpinning = false;
                }, 4000);
            }, 8000);
        }

        document.getElementById('spinner').addEventListener('click', spin);
        document.getElementById('add-btn').addEventListener('click', () => {
            const val = document.getElementById('new-option').value.trim().substring(0, MAX_CHARS);
            if (val && !dinnerOptions.map(o => o.toUpperCase()).includes(val.toUpperCase())) {
                dinnerOptions.push(val.toUpperCase());
                document.getElementById('new-option').value = '';
                save(); refresh();
            }
        });
        
        document.getElementById('new-option').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('add-btn').click();
        });

        const saved = localStorage.getItem('vannaBiteOptions');
        if (saved) dinnerOptions = JSON.parse(saved);
        refresh();
    </script>
</body>
</html>
