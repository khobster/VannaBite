<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANNA BITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Flex:opsz,wght@8..144,100..1000&family=Staatliches&display=swap');
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Staatliches', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background: #faf8f0;
            padding: 20px;
            padding-top: 40px;
            color: #333;
            overflow-x: hidden;
        }
        
        h1 {
            font-family: 'Bebas Neue', Impact, sans-serif;
            color: #e8b923;
            margin-bottom: 20px;
            text-align: center;
            font-size: 10rem;
            letter-spacing: 6px;
            text-shadow: 
                1px 1px 0px #1a1a1a,
                2px 2px 0px #1a1a1a,
                3px 3px 0px #1a1a1a,
                4px 4px 0px #1a1a1a,
                5px 5px 0px #1a1a1a,
                6px 6px 0px #1a1a1a,
                7px 7px 0px #1a1a1a,
                8px 8px 0px #1a1a1a,
                9px 9px 0px #1a1a1a,
                10px 10px 0px #1a1a1a,
                11px 11px 0px #1a1a1a,
                12px 12px 0px #1a1a1a;
            z-index: 100;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; max-width: 1400px; width: 100%; }
        
        .game-area { 
            display: flex; 
            align-items: flex-end; 
            justify-content: center; 
            width: 100%; 
            position: relative;
            margin-bottom: 20px;
        }
        
        /* === PAT & VANNA HOSTS === */
        .hosts-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 40px;
            z-index: 5;
        }
        
        .host-wrapper {
            overflow: hidden;
            position: relative;
        }
        
        .host {
            background-repeat: no-repeat;
        }
        
        /* === PAT === */
        .pat-wrapper {
            width: 220px;
            height: 270px;
        }
        
        .pat {
            width: 230px;
            height: 280px;
            background-image: url('pat_sajack_animation_sheet.png');
            background-size: 470px 570px;
            position: relative;
            left: -5px;
            top: -5px;
        }
        
        .pat.idle { background-position: 0px 0px; }
        .pat.watching { background-position: -235px 0px; }
        .pat.talk-closed { background-position: 0px -285px; }
        .pat.talk-open { background-position: -235px -285px; }
        
        .wheel-container { 
            position: relative; 
            width: 500px; 
            height: 500px; 
            flex-shrink: 0;
            z-index: 2;
        }
        
        .wheel-outer-rim {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(160deg, #d4a84b 0%, #c9952c 30%, #a67c00 50%, #c9952c 70%, #d4a84b 100%);
            box-shadow: 
                inset 0 0 0 4px #8b6914,
                inset 0 0 0 8px #d4a84b,
                0 8px 25px rgba(0,0,0,0.6);
        }
        
        .wheel {
            position: absolute;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            top: 12px;
            left: 12px;
            border-radius: 50%;
            overflow: hidden;
            transition: transform 8s cubic-bezier(0.15, 0.85, 0.1, 1);
        }
        
        .wheel svg { width: 100%; height: 100%; }
        
        .center-hub {
            position: absolute; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px; 
            height: 140px;
            background: radial-gradient(circle at 40% 35%, #5dbe5d 0%, #3aa63a 40%, #2d8a2d 70%, #1f6b1f 100%);
            border-radius: 50%; 
            z-index: 10;
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #fff; 
            font-size: 26px;
            font-family: 'Staatliches', cursive;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.7);
            border: 4px solid #2d7a2d;
            box-shadow: 
                inset 0 3px 10px rgba(255,255,255,0.3),
                inset 0 -5px 15px rgba(0,0,0,0.3),
                0 4px 10px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        
        .center-hub:hover { transform: translate(-50%, -50%) scale(1.05); }
        
        .pointer {
            position: absolute; 
            top: -5px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 15;
            width: 0; height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 60px solid #cc0000;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.5));
        }
        
        .pointer::after {
            content: '';
            position: absolute;
            top: -60px; left: -16px;
            width: 0; height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 50px solid #ff3333;
        }
        
        /* === WHEEL OF FORTUNE LETTER BOARD === */
        .result-board-container {
            margin-top: 10px;
            perspective: 1000px;
            z-index: 10;
        }
        
        .result-board {
            position: relative;
            padding: 20px 25px;
            background: linear-gradient(180deg, #1a3d2a 0%, #0f2518 100%);
            border-radius: 15px;
            box-shadow: 
                inset 0 0 40px rgba(0,0,0,0.6),
                0 10px 30px rgba(0,0,0,0.5);
        }
        
        .result-board::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            background: 
                repeating-conic-gradient(
                    from 0deg,
                    #d4a84b 0deg 2.5deg,
                    #8b6914 2.5deg 5deg
                );
            border-radius: 22px;
            z-index: -1;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        
        .board-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 6px;
        }
        
        .board-row:last-child { margin-bottom: 0; }
        
        .tile-container {
            width: 42px;
            height: 52px;
            perspective: 500px;
        }
        
        .tile-flipper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }
        
        .tile-container.revealed .tile-flipper {
            transform: rotateX(180deg);
        }
        
        .tile-front, .tile-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tile-front {
            background: linear-gradient(180deg, #3d8b5a 0%, #2a5f3d 100%);
            border: 2px solid #1a3d28;
            box-shadow: 
                inset 0 2px 4px rgba(255,255,255,0.2),
                inset 0 -2px 4px rgba(0,0,0,0.3),
                2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .tile-back {
            background: linear-gradient(180deg, #ffffff 0%, #e8e8e8 100%);
            border: 2px solid #222;
            transform: rotateX(180deg);
            font-family: 'Staatliches', serif;
            font-size: 28px;
            color: #111;
            box-shadow: 
                inset 0 2px 0 rgba(255,255,255,0.8),
                inset 0 -2px 0 rgba(0,0,0,0.1),
                2px 2px 0 rgba(0,0,0,0.3);
        }
        
        /* === CLEAN CONTROLS & LIST === */
        .controls { 
            margin-top: 80px; 
            margin-bottom: 50px;
            display: flex; 
            flex-direction: column; 
            width: 100%; 
            max-width: 520px;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #eaeaea;
        }
        
        .input-group { 
            display: flex; 
            margin-bottom: 8px; 
            gap: 12px;
        }
        
        input {
            flex-grow: 1; 
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px; 
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 700;
            background: #faf8f0;
            color: #333;
            letter-spacing: 0.5px;
            transition: border-color 0.2s, background 0.2s;
        }
        
        input::placeholder { color: #a0a0a0; }
        input:focus { outline: none; border-color: #d4a84b; background: #ffffff; }
        
        button {
            padding: 14px 28px; 
            background: #d4a84b;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px; 
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
        }
        
        button:hover { 
            background: #b88f3a;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .char-limit {
            text-align: right;
            padding: 0 4px;
            color: #999;
            font-size: 13px;
            letter-spacing: 1px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 600;
        }
        
        .option-list {
            margin-top: 24px; 
            background: transparent;
        }
        
        .option-list h3 {
            text-align: left; 
            padding: 0 0 12px 0; 
            margin: 0;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 800;
            color: #222; 
            font-size: 1.4rem;
            letter-spacing: 1px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        #option-count {
            text-align: left;
            padding: 8px 0;
            color: #777;
            font-size: 14px;
            letter-spacing: 1px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 600;
        }

        .options-scroll { 
            max-height: 240px; 
            overflow-y: auto; 
            padding-right: 6px;
        }
        
        .options-scroll::-webkit-scrollbar { width: 6px; }
        .options-scroll::-webkit-scrollbar-thumb { background: #dcdcdc; border-radius: 10px; }
        
        .option-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 0; 
            border-bottom: 1px solid #f0f0f0;
            background: transparent;
        }
        
        .option-item:last-child { border-bottom: none; }
        
        .option-item span { 
            display: flex; 
            align-items: center; 
            gap: 14px;
            font-size: 18px;
            letter-spacing: 0.5px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 700;
            color: #444;
        }
        
        .color-dot { 
            width: 20px; height: 20px; 
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #ccc;
            border-radius: 50%;
        }
        
        .delete-btn { 
            background: #f4f4f4;
            color: #888; 
            padding: 6px 12px;
            font-size: 14px;
            font-family: 'Roboto Flex', sans-serif;
            font-weight: 700;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .delete-btn:hover { 
            background: #ffebee;
            color: #d32f2f;
        }
        
        @media (max-width: 950px) {
            .game-area { flex-direction: column; align-items: center; gap: 20px; }
            .hosts-container { order: -1; margin-right: 0; margin-bottom: 0; }
            .pat-wrapper { width: 160px; height: 200px; }
            
            /* SWAP TO MOBILE SPRITE SHEET */
            .pat { 
                width: 170px; height: 210px; 
                background-image: url('pat_sajack_animation_sheet_mobile.png'); 
                background-size: 350px 430px; 
            }
            
            /* Map to the new mobile sprite sheet coordinates */
            .pat.idle { background-position: 0px 0px; } /* Top-Left: Gaze Down Idle */
            .pat.watching { background-position: 0px 0px; } /* Top-Left: Gaze Down Idle */
            
            /* Toggle bottom two frames for celebrating/talking */
            .pat.talk-closed { background-position: 0px -215px; } /* Bottom-Left: Gaze Down Side (L) */
            .pat.talk-open { background-position: -175px -215px; } /* Bottom-Right: Gaze Down Side (R) */
            
            .wheel-container { width: 380px; height: 380px; }
            .center-hub { width: 110px; height: 110px; font-size: 20px; }
            h1 { 
                font-size: 5rem; 
                letter-spacing: 3px; 
                text-shadow: 
                    1px 1px 0px #1a1a1a,
                    2px 2px 0px #1a1a1a,
                    3px 3px 0px #1a1a1a,
                    4px 4px 0px #1a1a1a,
                    5px 5px 0px #1a1a1a,
                    6px 6px 0px #1a1a1a;
            }
            .tile-container { width: 32px; height: 42px; }
            .tile-back { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VANNA BITE</h1>
        
        <div class="game-area">
            <div class="hosts-container">
                <div class="host-wrapper pat-wrapper">
                    <div class="host pat idle" id="pat"></div>
                </div>
            </div>
            
            <div class="wheel-container">
                <div class="wheel-outer-rim"></div>
                <div class="wheel" id="wheel"></div>
                <div class="center-hub" id="spinner">SPIN!</div>
                <div class="pointer"></div>
            </div>
        </div>
        
        <div class="result-board-container">
            <div class="result-board">
                <div class="board-row" id="row-0"></div>
                <div class="board-row" id="row-1"></div>
                <div class="board-row" id="row-2"></div>
            </div>
        </div>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="new-option" placeholder="ENTER DINNER OPTION..." maxlength="8">
                <button id="add-btn">ADD</button>
            </div>
            <div class="char-limit">MAX 8 LETTERS</div>
            <div class="option-list">
                <h3>TONIGHT'S OPTIONS</h3>
                <div id="option-count"></div>
                <div class="options-scroll">
                    <div id="options-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const MAX_CHARS = 8;
        const TILES_PER_ROW = 12;
        let dinnerOptions = ["PIZZA", "TACOS", "PASTA", "BURGERS", "CHINESE", "SUSHI", "BBQ", "SALAD"];
        let wheelColors = [];
        let blackSliceIndex = 0;
        let talkingInterval = null;

        function buildBoard() {
            for (let r = 0; r < 3; r++) {
                const row = document.getElementById(`row-${r}`);
                row.innerHTML = '';
                for (let c = 0; c < TILES_PER_ROW; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile-container';
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tile.innerHTML = `
                        <div class="tile-flipper">
                            <div class="tile-front"></div>
                            <div class="tile-back"></div>
                        </div>
                    `;
                    row.appendChild(tile);
                }
            }
        }

        function generateWheelColors(count) {
            if (count === 0) return [];
            const colors = [];
            const colorCount = count - 1;
            const step = 360 / Math.max(colorCount, 1);
            blackSliceIndex = Math.floor(count / 2);
            let hueIndex = 0;
            for (let i = 0; i < count; i++) {
                if (i === blackSliceIndex) {
                    colors.push({ bg: '#111111' });
                } else {
                    const hue = Math.floor(hueIndex * step);
                    colors.push({ bg: `hsl(${hue}, 80%, 50%)` });
                    hueIndex++;
                }
            }
            return colors;
        }
        
        const wheel = document.getElementById('wheel');
        const pat = document.getElementById('pat');
        
        function setHostsState(state) {
            if (talkingInterval) {
                clearInterval(talkingInterval);
                talkingInterval = null;
            }
            
            if (state === 'watching') {
                pat.className = 'host pat watching';
            } else if (state === 'celebrating') {
                let toggle = true;
                talkingInterval = setInterval(() => {
                    pat.className = 'host pat ' + (toggle ? 'talk-open' : 'talk-closed');
                    toggle = !toggle;
                }, 150);
            } else {
                pat.className = 'host pat idle';
            }
        }
        
        function resetBoard() {
            const tiles = document.querySelectorAll('.tile-container');
            tiles.forEach(tile => {
                tile.classList.remove('revealed');
                tile.querySelector('.tile-back').textContent = '';
            });
        }
        
        function revealAnswer(text) {
            const letters = text.toUpperCase();
            const len = letters.length;
            const middleRow = 1;
            const startCol = Math.floor((TILES_PER_ROW - len) / 2);
            const allTiles = document.querySelectorAll('.tile-container');
            
            let revealIndex = 0;
            letters.split('').forEach((letter, i) => {
                const col = startCol + i;
                allTiles.forEach(tile => {
                    if (parseInt(tile.dataset.row) === middleRow && parseInt(tile.dataset.col) === col) {
                        tile.querySelector('.tile-back').textContent = letter;
                        setTimeout(() => {
                            tile.classList.add('revealed');
                        }, revealIndex * 200);
                        revealIndex++;
                    }
                });
            });
        }
        
        function createWheel() {
            const n = dinnerOptions.length;
            if (n === 0) { 
                wheel.innerHTML = '<div style="width:100%;height:100%;background:#e0e0e0;border-radius:50%;"></div>';
                wheelColors = [];
                return; 
            }
            
            wheelColors = generateWheelColors(n);
            const sliceAngle = 360 / n;
            const sliceAngleRad = (sliceAngle * Math.PI) / 180;
            const size = 476;
            const cx = size / 2, cy = size / 2;
            const radius = size / 2, innerRadius = 75;
            
            let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            
            for (let i = 0; i < n; i++) {
                const startAngle = (i * sliceAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * sliceAngle - 90) * Math.PI / 180;
                const x1 = cx + radius * Math.cos(startAngle);
                const y1 = cy + radius * Math.sin(startAngle);
                const x2 = cx + radius * Math.cos(endAngle);
                const y2 = cy + radius * Math.sin(endAngle);
                const largeArc = sliceAngle > 180 ? 1 : 0;
                svg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${wheelColors[i].bg}" stroke="#222" stroke-width="1"/>`;
            }
            
            for (let i = 0; i < n; i++) {
                const angle = (i * sliceAngle - 90) * Math.PI / 180;
                svg += `<line x1="${cx + innerRadius * Math.cos(angle)}" y1="${cy + innerRadius * Math.sin(angle)}" x2="${cx + radius * Math.cos(angle)}" y2="${cy + radius * Math.sin(angle)}" stroke="#a67c00" stroke-width="3"/>`;
            }
            
            for (let i = 0; i < n; i++) {
                const midAngleDeg = (i + 0.5) * sliceAngle;
                const midAngle = (midAngleDeg - 90) * Math.PI / 180;
                const text = dinnerOptions[i].toUpperCase().substring(0, MAX_CHARS);
                if (!text.length) continue;
                
                const outerR = radius - 12, innerR = innerRadius + 8;
                const availableRadial = outerR - innerR;
                const baseFontSize = availableRadial / text.length * 0.95;
                
                for (let j = 0; j < text.length; j++) {
                    const letterRadius = outerR - (j * baseFontSize) - (baseFontSize / 2);
                    if (letterRadius < innerR) break;
                    
                    const sliceWidth = 2 * letterRadius * Math.sin(sliceAngleRad / 2);
                    const scaleX = (sliceWidth * 0.85) / (baseFontSize * 0.55);
                    const lx = cx + letterRadius * Math.cos(midAngle);
                    const ly = cy + letterRadius * Math.sin(midAngle);
                    const transform = `rotate(${midAngleDeg}, ${lx}, ${ly}) scale(${scaleX}, 1)`;
                    const ax = lx / scaleX;
                    
                    svg += `<text x="${ax + 2/scaleX}" y="${ly + 2}" font-family="Staatliches, Impact" font-size="${baseFontSize}" text-anchor="middle" dominant-baseline="middle" fill="#000" transform="${transform}">${text[j]}</text>`;
                    svg += `<text x="${ax}" y="${ly}" font-family="Staatliches, Impact" font-size="${baseFontSize}" text-anchor="middle" dominant-baseline="middle" fill="#fff" stroke="#000" stroke-width="1.5" paint-order="stroke fill" transform="${transform}">${text[j]}</text>`;
                }
            }
            
            svg += '</svg>';
            wheel.innerHTML = svg;
        }
        
        function updateList() {
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            document.getElementById('option-count').innerText = `${dinnerOptions.length} OPTIONS`;
            dinnerOptions.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                const color = wheelColors[i]?.bg || '#888';
                div.innerHTML = `<span><div class="color-dot" style="background:${color}"></div>${opt.toUpperCase()}</span><button class="delete-btn" onclick="removeItem(${i})">✕</button>`;
                list.appendChild(div);
            });
        }
        
        function removeItem(i) { dinnerOptions.splice(i, 1); save(); refresh(); }
        function refresh() { createWheel(); updateList(); }
        function save() { localStorage.setItem('vannaBiteOptions', JSON.stringify(dinnerOptions)); }

        let isSpinning = false;
        let currentRotation = 0;

        function spin() {
            if (isSpinning || dinnerOptions.length === 0) return;
            isSpinning = true;
            
            resetBoard();
            setHostsState('watching');
            
            const n = dinnerOptions.length;
            const sliceAngle = 360 / n;
            const winnerIndex = Math.floor(Math.random() * n);
            const targetRotation = 360 - (winnerIndex * sliceAngle + sliceAngle / 2);
            const extraSpins = 360 * (8 + Math.floor(Math.random() * 6));
            const totalRotation = currentRotation + extraSpins + (targetRotation - (currentRotation % 360));
            const finalRotation = totalRotation > currentRotation ? totalRotation : totalRotation + 360;
            currentRotation = finalRotation;
            
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            
            setTimeout(() => {
                setHostsState('celebrating');
                revealAnswer(dinnerOptions[winnerIndex]);
                setTimeout(() => { setHostsState('idle'); isSpinning = false; }, 4000);
            }, 8000);
        }

        document.getElementById('spinner').addEventListener('click', spin);
        document.getElementById('add-btn').addEventListener('click', () => {
            const val = document.getElementById('new-option').value.trim().substring(0, MAX_CHARS);
            if (val && !dinnerOptions.map(o => o.toUpperCase()).includes(val.toUpperCase())) {
                dinnerOptions.push(val.toUpperCase());
                document.getElementById('new-option').value = '';
                save(); refresh();
            }
        });
        document.getElementById('new-option').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('add-btn').click(); });

        const saved = localStorage.getItem('vannaBiteOptions');
        if (saved) dinnerOptions = JSON.parse(saved);
        buildBoard();
        refresh();
    </script>
</body>
</html>
